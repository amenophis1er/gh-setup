# Personal GitHub account — a few repos with sensible defaults.
# Usage: gh setup apply -c examples/personal.yaml

account:
  type: individual
  name: myuser

defaults:
  visibility: public
  default_branch: main
  delete_branch_on_merge: true
  branch_protection:
    preset: basic               # block force push and branch deletion

labels:
  replace_defaults: true
  items:
    - { name: "bug",         color: "d73a4a",  description: "Something isn't working" }
    - { name: "enhancement", color: "a2eeef",  description: "New feature or request" }
    - { name: "docs",        color: "0075ca",  description: "Documentation" }
    - { name: "chore",       color: "cfd3d7",  description: "Maintenance" }

repos:
  - name: dotfiles
    description: "My dotfiles"
    topics: ["dotfiles", "config"]
  - name: blog
    description: "Personal blog"
    topics: ["blog", "hugo"]
    ci: node

governance:
  contributing: true
  security_policy: true

security:
  dependabot: true
  secret_scanning: true
