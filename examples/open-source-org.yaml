# Open-source organization — public repos, strict protection, governance files.
# Usage: gh setup apply -c examples/open-source-org.yaml

account:
  type: organization
  name: my-oss-org

defaults:
  visibility: public
  default_branch: main
  delete_branch_on_merge: true
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: false
  has_discussions: true
  branch_protection:
    preset: strict              # require PR + CI + up-to-date + block force push

repo_scope: all                 # apply defaults to every repo in the org

labels:
  replace_defaults: true
  items:
    - { name: "bug",              color: "d73a4a",  description: "Something isn't working" }
    - { name: "enhancement",      color: "a2eeef",  description: "New feature or request" }
    - { name: "breaking",         color: "e11d48",  description: "Breaking change" }
    - { name: "good first issue", color: "7057ff",  description: "Good for newcomers" }
    - { name: "help wanted",      color: "008672",  description: "Extra attention is needed" }
    - { name: "docs",             color: "0075ca",  description: "Documentation" }
    - { name: "ci",               color: "e4e669",  description: "CI/CD changes" }
    - { name: "chore",            color: "cfd3d7",  description: "Maintenance" }

repos:
  # Only repos that need overrides — all others get the defaults above
  - name: website
    description: "Organization website"
    topics: ["website", "hugo"]
    ci: node
    extra_protection:
      preset: basic             # lighter protection for the website

teams:
  - name: maintainers
    description: "Core maintainers"
    permission: admin
    members: ["alice", "bob"]
  - name: contributors
    description: "Community contributors"
    permission: write
    members: []

governance:
  contributing: true
  code_of_conduct: true
  security_policy: true
  codeowners: "* @my-oss-org/maintainers"

security:
  dependabot: true
  secret_scanning: true
  code_scanning: true
