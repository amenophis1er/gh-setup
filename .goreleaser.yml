version: 2

builds:
  - binary: gh-setup
    ldflags:
      - -s -w -X github.com/amenophis1er/gh-setup/cmd.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

brews:
  - name: gh-setup
    repository:
      owner: amenophis1er
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/amenophis1er/gh-setup"
    description: "A CLI tool that declaratively configures GitHub accounts, repositories, branch protection, teams, labels, CI, and governance from a YAML config file."
    license: "MIT"
    dependencies:
      - name: gh
        type: optional
    install: |
      bin.install "gh-setup"
      generate_completions_from_executable(bin/"gh-setup", "completion")

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
